name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
       
      - name: Install dependencies
        run: |
          # Install build dependencies
          sudo apt-get update
          sudo apt-get install -y build-essential git pkg-config libxxhash-dev
          
          # Clone and build libqsys (dependency of libqmap)
          git clone --depth 1 https://github.com/tty-pt/libqsys.git /tmp/libqsys
          cd /tmp/libqsys
          make
          sudo make install
          sudo ldconfig
          
          # Clone and build libqmap
          git clone --depth 1 https://github.com/tty-pt/libqmap.git /tmp/libqmap
          cd /tmp/libqmap
          make
          sudo make install
          sudo ldconfig
       
      - name: Build libgeo
        run: make libgeo
      
      - name: Run unit tests
        run: make -C tests test-unit
  
  property-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |

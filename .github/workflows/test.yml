name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
       
      - name: Install dependencies
        run: |
          # Install tty.pt apt repository
          wget -qO- https://tty.pt/apt/keyrings/archive-key.gpg | sudo tee /etc/apt/keyrings/ttypt.asc > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/ttypt.asc] https://tty.pt/deb stable main" | sudo tee /etc/apt/sources.list.d/ttypt.list
          sudo apt update
          sudo apt install -y libqmap-dev libqsys-dev libxxhash-dev
       
      - name: Build libgeo
        run: make libgeo
      
      - name: Run unit tests
        run: make -C tests test-unit
  
  property-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          # Install tty.pt apt repository
          wget -qO- https://tty.pt/apt/keyrings/archive-key.gpg | sudo tee /etc/apt/keyrings/ttypt.asc > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/ttypt.asc] https://tty.pt/deb stable main" | sudo tee /etc/apt/sources.list.d/ttypt.list
          sudo apt update
          sudo apt install -y libqmap-dev libqsys-dev libxxhash-dev

      - name: Build libgeo
        run: make libgeo

      - name: Run property-based tests
        run: make -C tests test-property
  
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          # Install tty.pt apt repository
          wget -qO- https://tty.pt/apt/keyrings/archive-key.gpg | sudo tee /etc/apt/keyrings/ttypt.asc > /dev/null
          echo "deb [arch=amd64 signed-by=/etc/apt/keyrings/ttypt.asc] https://tty.pt/deb stable main" | sudo tee /etc/apt/sources.list.d/ttypt.list
          sudo apt update
          sudo apt install -y libqmap-dev libqsys-dev libxxhash-dev

      - name: Build libgeo
        run: make libgeo

      - name: Run benchmarks
        run: make -C tests bench

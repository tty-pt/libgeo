name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
       
      - name: Install dependencies
        run: |
          # Dependencies would be installed here
          # For now, assuming libqmap and dependencies are available
          echo "Dependencies installation step"
      
      - name: Build libgeo
        run: make libgeo
      
      - name: Run unit tests
        run: make -C tests test-unit
  
  property-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: echo "Dependencies installation step"

      - name: Build libgeo
        run: make libgeo

      - name: Run property-based tests
        run: make -C tests test-property
  
  benchmarks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: echo "Dependencies installation step"

      - name: Build libgeo
        run: make libgeo

      - name: Run benchmarks
        run: make -C tests bench
